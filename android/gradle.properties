org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# Keep legacy Kotlin plugin compatibility while plugins finish AGP 9 migration.
android.builtInKotlin=false
# Avoid Kotlin daemon incremental-cache path issues on Windows when Flutter
# plugins are compiled from the Pub cache on a different drive.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
kotlin.jvm.target.validation.mode=warning
